<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdvisorLink Custodian Portal — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 400px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 40px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 { font-size: 22px; color: #00D4B4; letter-spacing: -0.5px; }
    .logo p  { font-size: 12px; color: #64748b; margin-top: 4px; }
    label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 14px;
      margin-bottom: 18px;
      outline: none;
    }
    input:focus { border-color: #00D4B4; }
    .btn {
      width: 100%;
      padding: 12px;
      background: #00D4B4;
      color: #0f172a;
      font-weight: 700;
      font-size: 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn:hover { background: #00bfa0; }
    .hint {
      font-size: 12px;
      color: #475569;
      text-align: center;
      margin-top: 20px;
    }
    .hint span { color: #94a3b8; }
    #error {
      display: none;
      background: #7f1d1d;
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>AdvisorLink</h1>
      <p>Custodian Portal — Demo Environment</p>
    </div>
    <div id="error">Invalid credentials. Use demo / demo123</div>
    <div>
      <label for="username">Advisor ID</label>
      <input type="text" id="username" name="username" placeholder="advisor@firm.com" autocomplete="off">
    </div>
    <div>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••">
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <p class="hint">Demo credentials: <span>demo</span> / <span>demo123</span></p>
  </div>

  <script>
    function doLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      const err = document.getElementById('error');

      // Accept anything with "demo" in username or explicit demo creds
      if (u === 'demo' && p === 'demo123' || u.includes('demo')) {
        err.style.display = 'none';
        // Pass selected client through query param if present
        const params = new URLSearchParams(window.location.search);
        const client = params.get('client') || 'CLT001';
        window.location.href = 'dashboard.html?client=' + client;
      } else {
        err.style.display = 'block';
      }
    }

    // Allow Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    // Pre-fill if client param present
    const params = new URLSearchParams(window.location.search);
    if (params.get('username')) {
      document.getElementById('username').value = params.get('username');
    }
  </script>
</body>
</html>

# =============================================================================
# Nginx reverse proxy for WealthRadar backend
# Place at: /etc/nginx/conf.d/wealth-radar.conf
# =============================================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.wealthradar.pranshudhingra.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.wealthradar.pranshudhingra.com;

    # SSL — provisioned by Certbot (see setup instructions)
    ssl_certificate     /etc/letsencrypt/live/api.wealthradar.pranshudhingra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.wealthradar.pranshudhingra.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE streaming — disable buffering so events flow in real-time
    proxy_buffering          off;
    proxy_cache              off;
    proxy_read_timeout       300s;
    proxy_send_timeout       300s;
    keepalive_timeout        300s;

    # WebSocket upgrade support
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Route all traffic to FastAPI
    location / {
        proxy_pass http://127.0.0.1:8000;
    }
}
